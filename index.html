<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master French 100</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header>
            <h1>Français Master 🇫🇷</h1>
            <div class="progress-container">
                <div id="progress-bar"></div>
            </div>
            <p id="stats">Questão: 1/100</p>
        </header>

        <div id="quiz">
            <h2 id="question">Carregando...</h2>
            <div id="options" class="options-grid">
                </div>
            <p id="feedback"></p>
        </div>

        <button id="next-btn" class="hidden">Continuar</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
